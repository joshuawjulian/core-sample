# Core Sample — book + per-article PDF configuration.
project:
  type: book
  output-dir: _book

book:
  title: "Core Sample"
  subtitle: "An inch wide and a mile deep"
  author: "Joshua Julian"
  chapters:
    - index.qmd
    - part: "Probability Foundations"
      chapters:
        - articles/probability-foundations/PROB-00-what-is-probability.qmd
        - articles/probability-foundations/PROB-01-conditional-probability-and-bayes.qmd
        - articles/probability-foundations/PROB-02-random-variables.qmd
        - articles/probability-foundations/PROB-03-discrete-random-variables-pmf.qmd
        - articles/probability-foundations/PROB-04-continuous-random-variables-pdf.qmd
        - articles/probability-foundations/PROB-05-expectation.qmd
        - articles/probability-foundations/PROB-06-variance-and-sum-of-squares.qmd
        - articles/probability-foundations/PROB-07-joint-distributions-covariance-correlation.qmd
        - articles/probability-foundations/PROB-08-independence-and-iid.qmd
        - articles/probability-foundations/PROB-09-conditional-distributions-and-expectation.qmd
        - articles/probability-foundations/PROB-10-counting-permutations-combinations.qmd
        - articles/probability-foundations/PROB-11-bernoulli-binomial-negative-binomial.qmd
        - articles/probability-foundations/PROB-12-poisson-distribution.qmd
        - articles/probability-foundations/PROB-13-normal-distribution.qmd
        - articles/probability-foundations/PROB-14-gamma-exponential-beta.qmd
        - articles/probability-foundations/PROB-15-chi-square-t-f.qmd
        - articles/probability-foundations/PROB-16-exponential-family.qmd
        - articles/probability-foundations/PROB-17-random-vectors-covariance-matrices.qmd
        - articles/probability-foundations/PROB-18-linear-transforms-of-random-vectors.qmd
        - articles/probability-foundations/PROB-19-chebyshev-inequality.qmd
        - articles/probability-foundations/PROB-20-mgf-and-characteristic-functions.qmd
        - articles/probability-foundations/PROB-21-modes-of-convergence.qmd
        - articles/probability-foundations/PROB-22-empirical-cdf-and-resampling.qmd
        - articles/probability-foundations/PROB-23-order-statistics.qmd
    - part: "Geometry of Data"
      chapters:
        - articles/geometry-of-data/GEOM-00-what-is-a-vector.qmd
        - articles/geometry-of-data/GEOM-01-linear-combinations.qmd
        - articles/geometry-of-data/GEOM-02-span-and-subspaces.qmd
        - articles/geometry-of-data/GEOM-03-linear-independence-basis-dimension.qmd
        - articles/geometry-of-data/GEOM-04-dot-product.qmd
        - articles/geometry-of-data/GEOM-05-orthogonality-orthonormal-bases.qmd
        - articles/geometry-of-data/GEOM-06-orthogonal-projection.qmd
        - articles/geometry-of-data/GEOM-07-gram-schmidt-qr.qmd
        - articles/geometry-of-data/GEOM-08-matrices-as-linear-maps.qmd
        - articles/geometry-of-data/GEOM-09-matrix-multiplication-as-composition.qmd
        - articles/geometry-of-data/GEOM-10-the-transpose.qmd
        - articles/geometry-of-data/GEOM-11-solving-ax-equals-b.qmd
        - articles/geometry-of-data/GEOM-12-rank-four-fundamental-subspaces.qmd
        - articles/geometry-of-data/GEOM-13-the-determinant.qmd
        - articles/geometry-of-data/GEOM-14-eigenvalues-eigenvectors.qmd
        - articles/geometry-of-data/GEOM-15-diagonalization-eigendecomposition.qmd
        - articles/geometry-of-data/GEOM-16-symmetric-matrices-spectral-theorem.qmd
        - articles/geometry-of-data/GEOM-17-quadratic-forms.qmd
        - articles/geometry-of-data/GEOM-18-positive-definite-matrices.qmd
        - articles/geometry-of-data/GEOM-19-cholesky-matrix-square-root.qmd
        - articles/geometry-of-data/GEOM-20-singular-value-decomposition.qmd
        - articles/geometry-of-data/GEOM-21-svd-low-rank-pseudoinverse.qmd
        - articles/geometry-of-data/GEOM-22-vector-matrix-differentiation.qmd
        - articles/geometry-of-data/GEOM-23-the-gradient.qmd
        - articles/geometry-of-data/GEOM-24-the-hessian.qmd
        - articles/geometry-of-data/GEOM-25-gradient-hessian-quadratic-form.qmd
        - articles/geometry-of-data/GEOM-26-condition-number-numerical-stability.qmd
        - articles/geometry-of-data/GEOM-27-tools-power-data-science.qmd
    - part: "Regression"
      chapters:
        - articles/regression/REGR-00-why-a-line.qmd
        - articles/regression/REGR-01-ols-one-predictor.qmd

execute:
  freeze: auto

jupyter: python3

crossref:
  thm-title: "Theorem"
  lem-title: "Lemma"
  def-title: "Definition"
  cor-title: "Corollary"
  prp-title: "Proposition"

format:
  pdf:
    documentclass: scrbook
    classoption:
      - oneside        # digital PDF: no mirrored margins, no blank verso pages
      - open=any       # chapters start on the next page, not forced to the right
    number-sections: true
    toc: true
    colorlinks: true
    code-fold: false
    fig-pos: "H"       # pin figures where written instead of letting them float
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1.25in
    include-in-header:
      text: |
        \usepackage{mathtools}   % psmallmatrix etc. (amsmath superset) — fixes the GEOM render
        \raggedbottom            % don't stretch content to fill the page; pad at the bottom
