project:
  type: book
  output-dir: _book

book:
  title: "Core Sample"
  subtitle: "An inch wide and a mile deep"
  author: "Joshua Julian"
  chapters:
    - index.qmd
    - part: "Regression"
      chapters:
        - articles/regression/REGR-0-why-a-line.qmd
        - articles/regression/REGR-1-ols-one-predictor.qmd

execute:
  freeze: auto

jupyter: python3

crossref:
  thm-title: "Theorem"
  lem-title: "Lemma"
  def-title: "Definition"
  cor-title: "Corollary"
  prp-title: "Proposition"

format:
  pdf:
    documentclass: scrbook
    number-sections: true
    toc: true
    colorlinks: true
    code-fold: false
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1.25in
