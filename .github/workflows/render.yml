name: Render PDFs

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.claude/**'
      - 'tracks/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      # Repo root on PYTHONPATH so sitecustomize.py loads in the Jupyter kernel and makes
      # matplotlib mathtext tolerant of full LaTeX labels.
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto (+ TinyTeX)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies (for figure generation)
        run: |
          pip install -r requirements.txt
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      # --- Per-track books: one bound PDF per track (Probability Foundations.pdf, ...) ---
      - name: Render per-track books
        run: |
          python3 tools/make_track_books.py
          mkdir -p out/tracks
          for d in build/books/*/; do
            slug=$(basename "$d")
            echo "::group::track book: $slug"
            quarto render "$d" || echo "WARN: track book $slug failed to render"
            echo "::endgroup::"
            pdf=$(find "$d/_out" -name '*.pdf' 2>/dev/null | head -1)
            if [ -n "$pdf" ]; then cp "$pdf" "out/tracks/$slug.pdf"; fi
          done
          echo "Track books produced:"; ls -la out/tracks || true

      # --- Per-article standalone PDFs (grab one article). Best-effort. ---
      # Rendered in a temp copy of articles/ so each is a standalone document
      # (articles/_metadata.yml supplies the PDF format).
      - name: Render standalone article PDFs
        continue-on-error: true
        run: |
          set +e
          SRC="$RUNNER_TEMP/standalone"
          mkdir -p "$SRC"
          cp -r articles/. "$SRC/"
          mkdir -p out/articles
          find "$SRC" -name '*.qmd' -print0 | while IFS= read -r -d '' f; do
            quarto render "$f" --to pdf >/dev/null 2>&1 || echo "WARN: $f"
          done
          find "$SRC" -name '*.pdf' -exec cp {} out/articles/ \;
          echo "Article PDFs produced:"; ls out/articles | wc -l

      - name: Upload PDFs as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-sample-pdfs
          path: out/
          if-no-files-found: warn

      - name: Publish "latest" release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(find out -name '*.pdf')
          if [ -z "$files" ]; then echo "No PDFs to publish."; exit 0; fi
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest $files \
            --title "Latest PDFs" \
            --prerelease \
            --notes "Auto-built from ${{ github.sha }}. Per-track books + per-article PDFs."
