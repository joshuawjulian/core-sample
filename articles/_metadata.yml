# Shared metadata for every article under articles/.
# Quarto auto-applies this _metadata.yml to all documents in this folder tree,
# so each article renders STANDALONE to a self-contained PDF with these defaults.
# (In the book build, _quarto.yml's book-level format takes precedence.)

format:
  pdf:
    documentclass: scrartcl
    number-sections: true
    toc: true
    colorlinks: true
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1.25in
    include-in-header:
      text: |
        \usepackage{mathtools}   % psmallmatrix and other matrix variants

execute:
  echo: false
  warning: false
  freeze: auto

jupyter: python3

crossref:
  thm-title: "Theorem"
  lem-title: "Lemma"
  def-title: "Definition"
  cor-title: "Corollary"
  prp-title: "Proposition"
